version: '3'

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: test@123
      POSTGRES_DB: usersdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  redis:
    image: redis:7.2-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  kafka:
    image: bitnami/kafka:3.6
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft mode (no Zookeeper)
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # Storage (needed for KRaft metadata)
      - KAFKA_CFG_LOG_DIRS=/bitnami/kafka/data
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true

      # Allow unauthenticated access
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka

  userservice:
      build:
        context: ./userservice
        dockerfile: Dockerfile
      ports:
        - "8080:8080"
      depends_on:
        - postgres
        - kafka
        - redis
        - wsservice
        - zipkin
      environment:
        USER_DB_URL: jdbc:postgresql://postgres:5432/usersdb
        USER_DB_USER: root
        USER_DB_PASS: test@123
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: 6379
        APP_WS_URL: ws://wsservice:8084/ws
        ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
  productservice:
      build:
        context: ./productservice
        dockerfile: Dockerfile
      ports:
        - "8081:8081"
      depends_on:
        - postgres
        - kafka
        - redis
        - zipkin
      environment:
        USER_DB_URL: jdbc:postgresql://postgres:5432/usersdb
        USER_DB_USER: root
        USER_DB_PASS: test@123
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: 6379
        ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
  authservice:
      build:
        context: ./authservice
        dockerfile: Dockerfile
      ports:
        - "8082:8082"
      depends_on:
        - postgres
        - kafka
      environment:
        USER_DB_URL: jdbc:postgresql://postgres:5432/usersdb
        USER_DB_USER: root
        USER_DB_PASS: test@123
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  mcp:
      build:
        context: ./mcp
        dockerfile: Dockerfile
      ports:
        - "8085:8085"
      depends_on:
        - userservice
      environment:
        USER_SERVICE_URL: http://userservice:8080
  wsservice:
      build:
        context: ./ws
        dockerfile: Dockerfile
      ports:
        - "8084:8084"
      depends_on:
        - postgres
      environment:
        USER_DB_URL: jdbc:postgresql://postgres:5432/usersdb
        USER_DB_USER: root
        USER_DB_PASS: test@123
        MCP_SERVER_URL: http://mcp:8085
        OPENAI_API_KEY: OPENAI_API_KEY

  frontend:
      build:
        context: ./ui-app
        dockerfile: Dockerfile
      ports:
        - "3000:3000"
      environment:
        VITE_USER_SERVICE_URL: http://userservice:8080
        VITE_PRODUCT_SERVICE_URL: http://productservice:8081
        VITE_AUTH_SERVICE_URL: http://authservice:8081
      depends_on:
        - userservice
        - productservice
  
volumes:
  pgdata:
  pgadmin-data:
  redis_data:
  kafka_data:
    driver: local