spring.application.name = UserService
server.port=8080
spring.jpa.show-sql=true
spring.cache.type=redis

spring.datasource.url=${USER_DB_URL}
spring.datasource.username=${USER_DB_USER}
spring.datasource.password=${USER_DB_PASS}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
app.ws.url=${APP_WS_URL}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
logging.pattern.level= "%5p [${spring.application.name},%X{traceId},%X{spanId}]"
